# cnpg-cluster.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-cluster
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:15
  storage:
    storageClass: cnpg-hostpath
    size: 5Gi
  superuserSecret:
    name: cnpg-superuser-secret
  bootstrap:
    initdb:
      database: appdb
      owner: appuser
      secret:
        name: cnpg-superuser-secret
