apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-dep
  namespace: training
  annotations:
    kubernetes.io/change-cause: "initial release"
spec:
  replicas: 1
  selector:
    matchLabels:
      app-name: "app"
  template:
    metadata:
      namespace: training
      labels:
        app-name: "app"
    spec:
      containers:
        - name: nginx
          image: nginx:1.21-alpine
          ports:
            - containerPort: 80
          volumeMounts:
              - name: storage
                mountPath: /storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: static-0
